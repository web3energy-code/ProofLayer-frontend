<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wallet Test</title>
<style>
body{font-family:sans-serif;padding:1.5rem;background:#fff;color:#111;max-width:600px;margin:0 auto}
h1{color:#FF5C00;font-size:1.8rem;margin-bottom:1rem}
button{display:block;width:100%;padding:1rem;margin:0.5rem 0;background:#FF5C00;color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;border-radius:4px}
button:disabled{background:#ccc;cursor:not-allowed}
.box{background:#f5f5f5;border:1px solid #ddd;padding:1rem;margin:0.5rem 0;border-radius:4px;font-size:0.85rem;word-break:break-all;white-space:pre-wrap;display:none}
.ok{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;display:block}
.err{background:#ffebee;border-color:#f44336;color:#c62828;display:block}
.info{background:#e3f2fd;border-color:#2196f3;color:#1565c0;display:block}
</style>
</head>
<body>
<h1>🔮 ProofLayer Wallet Test v2</h1>

<div class="box info" id="envBox" style="display:block">Checking environment...</div>

<button onclick="step1()" id="btn1">STEP 1 — Detect Phantom</button>
<div class="box" id="s1"></div>

<button onclick="step2()" id="btn2" disabled>STEP 2 — Connect Wallet</button>
<div class="box" id="s2"></div>

<button onclick="step3()" id="btn3" disabled>STEP 3 — Test CORS (ping backend)</button>
<div class="box" id="s3"></div>

<button onclick="step4()" id="btn4" disabled>STEP 4 — Get Nonce</button>
<div class="box" id="s4"></div>

<button onclick="step5()" id="btn5" disabled>STEP 5 — Sign Message</button>
<div class="box" id="s5"></div>

<button onclick="step6()" id="btn6" disabled>STEP 6 — Verify + Get JWT</button>
<div class="box" id="s6"></div>

<script>
  // BS58 inline — no CDN, works in Phantom mobile browser
  const bs58 = (function() {
    const ALPHA = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
    const BASE = 58;
    const iFACTOR = Math.log(256) / Math.log(BASE);
    function encode(src) {
      if (!(src instanceof Uint8Array)) src = new Uint8Array(src);
      if (!src.length) return '';
      let zeros = 0;
      while (zeros < src.length && src[zeros] === 0) zeros++;
      const size = Math.ceil((src.length - zeros) * iFACTOR) + 1;
      const b58 = new Uint8Array(size);
      let length = 0;
      for (let i = zeros; i < src.length; i++) {
        let carry = src[i], j = 0;
        for (let it = size - 1; carry || j < length; it--, j++) {
          carry += 256 * b58[it]; b58[it] = carry % BASE; carry = Math.floor(carry / BASE);
        }
        length = j;
      }
      let it = size - length;
      while (it < size && b58[it] === 0) it++;
      return ALPHA[0].repeat(zeros) + [...b58.slice(it)].map(x => ALPHA[x]).join('');
    }
    function decode(str) {
      if (!str.length) return new Uint8Array(0);
      let zeros = 0;
      while (zeros < str.length && str[zeros] === ALPHA[0]) zeros++;
      const size = Math.ceil((str.length - zeros) * Math.log(BASE)/Math.log(256)) + 1;
      const b256 = new Uint8Array(size);
      let length = 0;
      for (let i = zeros; i < str.length; i++) {
        let carry = ALPHA.indexOf(str[i]);
        if (carry < 0) throw new Error('Invalid base58 char');
        let j = 0;
        for (let it = size - 1; carry || j < length; it--, j++) {
          carry += BASE * b256[it]; b256[it] = carry % 256; carry = Math.floor(carry / 256);
        }
        length = j;
      }
      let it = size - length;
      while (it < size && b256[it] === 0) it++;
      return b256.slice(it - zeros);
    }
    return { encode, decode };
  })();
</script>
<script>
// ── INLINE BS58 — no CDN needed ──────────────────────────────
// This is the complete bs58 encode function built directly in
// so we never have a "bs58 loaded: false" problem again
const BASE58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function encodeBase58(buffer) {
  const bytes = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
  let result = '';
  let i = bytes.length;
  const digits = [0];
  for (let j = 0; j < bytes.length; j++) {
    let carry = bytes[j];
    for (let k = 0; k < digits.length; k++) {
      carry += digits[k] << 8;
      digits[k] = carry % 58;
      carry = (carry / 58) | 0;
    }
    while (carry > 0) {
      digits.push(carry % 58);
      carry = (carry / 58) | 0;
    }
  }
  for (let j = 0; j < bytes.length - 1 && bytes[j] === 0; j++) {
    result += BASE58_ALPHABET[0];
  }
  for (let j = digits.length - 1; j >= 0; j--) {
    result += BASE58_ALPHABET[digits[j]];
  }
  return result;
}

const API = 'https://prooflayer-backend.onrender.com';
let provider, walletAddress, nonceMessage, signature, token;

function show(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'box ' + type;
  el.textContent = msg;
}

window.addEventListener('load', () => {
  const lines = [
    'window.phantom: ' + (!!window.phantom),
    'window.phantom.solana: ' + !!(window.phantom?.solana),
    'window.phantom.solana.isPhantom: ' + !!(window.phantom?.solana?.isPhantom),
    'window.solana: ' + (!!window.solana),
    'window.solana.isPhantom: ' + !!(window.solana?.isPhantom),
    'Inline bs58: LOADED ✅',
    'Device: ' + navigator.userAgent.slice(0, 60),
  ];
  const el = document.getElementById('envBox');
  el.textContent = lines.join('\n');
});

// STEP 1 — Detect Phantom
async function step1() {
  if (window.phantom?.solana?.isPhantom) {
    provider = window.phantom.solana;
    show('s1', '✅ window.phantom.solana found\nisPhantom: true\nReady to connect!', 'ok');
  } else if (window.solana?.isPhantom) {
    provider = window.solana;
    show('s1', '✅ window.solana found (legacy)\nisPhantom: true', 'ok');
  } else {
    show('s1', '❌ Phantom not found\nOpen this page inside the Phantom app browser', 'err');
    return;
  }
  document.getElementById('btn2').disabled = false;
}

// STEP 2 — Connect
async function step2() {
  try {
    show('s2', '⏳ Connecting... approve in Phantom', 'info');
    const resp = await provider.connect();
    walletAddress = resp.publicKey.toString();
    show('s2', '✅ Connected!\nAddress: ' + walletAddress, 'ok');
    document.getElementById('btn3').disabled = false;
  } catch(e) {
    show('s2', '❌ Connect failed\nCode: ' + e.code + '\n' + e.message, 'err');
  }
}

// STEP 3 — Test CORS with simple GET to /health
async function step3() {
  show('s3', '⏳ Testing CORS — pinging ' + API + '/health\nThis wakes the server if sleeping (up to 60s)...', 'info');
  try {
    const res = await fetch(API + '/health', {
      method: 'GET',
      signal: AbortSignal.timeout(70000),
    });
    const text = await res.text();
    show('s3', '✅ CORS OK! Server is awake!\nResponse: ' + text, 'ok');
    document.getElementById('btn4').disabled = false;
  } catch(e) {
    show('s3',
      '❌ CORS / Network failed\n' +
      'Error name: ' + e.name + '\n' +
      'Error message: ' + e.message + '\n\n' +
      'This means your backend is blocking requests from this domain.\n' +
      'Go to Render → Backend → Environment\n' +
      'Set ALLOWED_ORIGINS = *\n' +
      'Then redeploy.',
    'err');
  }
}

// STEP 4 — Get nonce
async function step4() {
  show('s4', '⏳ Getting nonce...', 'info');
  try {
    const res = await fetch(API + '/api/auth/nonce', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ walletAddress }),
      signal: AbortSignal.timeout(30000),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    nonceMessage = json.data.message;
    show('s4', '✅ Nonce received!\n' + nonceMessage, 'ok');
    document.getElementById('btn5').disabled = false;
  } catch(e) {
    show('s4', '❌ Nonce failed\n' + e.name + ': ' + e.message, 'err');
  }
}

// STEP 5 — Sign
async function step5() {
  show('s5', '⏳ Check Phantom for signature popup...', 'info');
  try {
    const encoded = new TextEncoder().encode(nonceMessage);
    const signed = await provider.signMessage(encoded, 'utf8');
    // Use inline bs58 — no CDN dependency
    signature = encodeBase58(signed.signature);
    show('s5', '✅ Signed!\nSignature: ' + signature.slice(0,50) + '...', 'ok');
    document.getElementById('btn6').disabled = false;
  } catch(e) {
    show('s5', '❌ Sign failed\nCode: ' + e.code + '\n' + e.message, 'err');
  }
}

// STEP 6 — Verify
async function step6() {
  show('s6', '⏳ Verifying signature...', 'info');
  try {
    const res = await fetch(API + '/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ walletAddress, signature }),
      signal: AbortSignal.timeout(30000),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    token = json.data.token;
    show('s6',
      '🎉 ALL STEPS PASSED!\n\n' +
      'Username: ' + json.data.user.username + '\n' +
      'Score: ' + json.data.user.reputationScore + '\n' +
      'Token: ' + token.slice(0,30) + '...\n\n' +
      'Wallet connect is 100% working!\n' +
      'Upload the main prooflayer.html now.',
    'ok');
  } catch(e) {
    show('s6', '❌ Verify failed\n' + e.name + ': ' + e.message, 'err');
  }
}
</script>
</body>
</html>
