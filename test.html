<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wallet Test</title>
<script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/index.min.js"></script>
<style>
body{font-family:sans-serif;padding:2rem;background:#fff;color:#111;max-width:600px;margin:0 auto}
h1{color:#FF5C00;font-size:2rem;margin-bottom:1rem}
button{display:block;width:100%;padding:1rem;margin:0.5rem 0;background:#FF5C00;color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;border-radius:4px}
button:disabled{background:#ccc}
.box{background:#f5f5f5;border:1px solid #ddd;padding:1rem;margin:0.5rem 0;border-radius:4px;font-size:0.85rem;word-break:break-all;white-space:pre-wrap}
.ok{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}
.err{background:#ffebee;border-color:#f44336;color:#c62828}
.info{background:#e3f2fd;border-color:#2196f3;color:#1565c0}
</style>
</head>
<body>

<h1>🔮 ProofLayer<br>Wallet Test</h1>
<p>This page tests each step separately so we know exactly what works.</p>

<div class="box info" id="envBox">Checking environment...</div>

<button onclick="step1()" id="btn1">STEP 1 — Detect Phantom</button>
<div class="box" id="s1" style="display:none"></div>

<button onclick="step2()" id="btn2" disabled>STEP 2 — Connect Wallet</button>
<div class="box" id="s2" style="display:none"></div>

<button onclick="step3()" id="btn3" disabled>STEP 3 — Get Nonce from Backend</button>
<div class="box" id="s3" style="display:none"></div>

<button onclick="step4()" id="btn4" disabled>STEP 4 — Sign Message</button>
<div class="box" id="s4" style="display:none"></div>

<button onclick="step5()" id="btn5" disabled>STEP 5 — Verify + Get JWT</button>
<div class="box" id="s5" style="display:none"></div>

<button onclick="step6()" id="btn6" disabled>STEP 6 — Load Dashboard Data</button>
<div class="box" id="s6" style="display:none"></div>

<script>
const API = 'https://prooflayer-backend.onrender.com';
let provider, walletAddress, nonceMessage, signature, token;

function show(id, msg, type) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.className = 'box ' + (type || '');
  el.textContent = msg;
}

// Check environment on load
window.addEventListener('load', () => {
  const env = document.getElementById('envBox');
  const lines = [];
  lines.push('window.phantom exists: ' + (!!window.phantom));
  lines.push('window.phantom.solana exists: ' + !!(window.phantom && window.phantom.solana));
  lines.push('window.phantom.solana.isPhantom: ' + !!(window.phantom && window.phantom.solana && window.phantom.solana.isPhantom));
  lines.push('window.solana exists: ' + (!!window.solana));
  lines.push('window.solana.isPhantom: ' + !!(window.solana && window.solana.isPhantom));
  lines.push('bs58 loaded: ' + (typeof bs58 !== 'undefined'));
  lines.push('userAgent: ' + navigator.userAgent.slice(0, 80));
  env.textContent = lines.join('\n');
  env.className = 'box info';
});

async function step1() {
  try {
    // Try official window.phantom.solana first
    if (window.phantom && window.phantom.solana && window.phantom.solana.isPhantom) {
      provider = window.phantom.solana;
      show('s1', '✅ Found window.phantom.solana (official Phantom API)\nisPhantom: ' + provider.isPhantom, 'ok');
    } else if (window.solana && window.solana.isPhantom) {
      provider = window.solana;
      show('s1', '✅ Found window.solana (legacy Phantom API)\nisPhantom: ' + provider.isPhantom, 'ok');
    } else {
      show('s1', '❌ Phantom not found.\nMake sure you are inside the Phantom app browser.\nTap the globe icon in Phantom then open this page.', 'err');
      return;
    }
    document.getElementById('btn2').disabled = false;
  } catch(e) {
    show('s1', '❌ Error: ' + e.message, 'err');
  }
}

async function step2() {
  try {
    show('s2', '⏳ Calling provider.connect()...', 'info');
    const resp = await provider.connect();
    walletAddress = resp.publicKey.toString();
    show('s2', '✅ Connected!\nWallet address: ' + walletAddress, 'ok');
    document.getElementById('btn3').disabled = false;
  } catch(e) {
    show('s2', '❌ Connect failed\nCode: ' + e.code + '\nMessage: ' + e.message, 'err');
  }
}

async function step3() {
  try {
    show('s3', '⏳ Fetching nonce from ' + API + '/api/auth/nonce\nThis may take 30-60 seconds if server is sleeping...', 'info');
    const res = await fetch(API + '/api/auth/nonce', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ walletAddress }),
      signal: AbortSignal.timeout(70000),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    nonceMessage = json.data.message;
    show('s3', '✅ Got nonce!\nMessage to sign:\n' + nonceMessage, 'ok');
    document.getElementById('btn4').disabled = false;
  } catch(e) {
    show('s3', '❌ Nonce fetch failed\nName: ' + e.name + '\nMessage: ' + e.message + '\n\nMake sure ' + API + '/health returns {"status":"ok"}', 'err');
  }
}

async function step4() {
  try {
    show('s4', '⏳ Asking Phantom to sign message...\nCheck Phantom for a popup!', 'info');
    const encoded = new TextEncoder().encode(nonceMessage);
    const signed = await provider.signMessage(encoded, 'utf8');
    signature = bs58.encode(signed.signature);
    show('s4', '✅ Message signed!\nSignature (first 40 chars):\n' + signature.slice(0,40) + '...', 'ok');
    document.getElementById('btn5').disabled = false;
  } catch(e) {
    show('s4', '❌ Sign failed\nCode: ' + e.code + '\nMessage: ' + e.message, 'err');
  }
}

async function step5() {
  try {
    show('s5', '⏳ Verifying signature with backend...', 'info');
    const res = await fetch(API + '/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ walletAddress, signature }),
      signal: AbortSignal.timeout(30000),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    token = json.data.token;
    show('s5', '✅ Verified! JWT received!\nToken (first 40 chars):\n' + token.slice(0,40) + '...\n\nUser: ' + json.data.user.username + '\nScore: ' + json.data.user.reputationScore, 'ok');
    document.getElementById('btn6').disabled = false;
  } catch(e) {
    show('s5', '❌ Verify failed\nName: ' + e.name + '\nMessage: ' + e.message, 'err');
  }
}

async function step6() {
  try {
    show('s6', '⏳ Loading dashboard data...', 'info');
    const res = await fetch(API + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    show('s6', '✅ ALL STEPS PASSED!\n\n' +
      'Username: ' + json.data.username + '\n' +
      'Wallet: ' + json.data.walletAddress + '\n' +
      'Score: ' + json.data.reputationScore + '\n' +
      'Badges: ' + (json.data.badges?.length || 0) + '\n\n' +
      '🎉 Wallet connect is working 100%!\nNow upload the main prooflayer.html file.', 'ok');
  } catch(e) {
    show('s6', '❌ Load failed\n' + e.message, 'err');
  }
}
</script>
</body>
</html>
